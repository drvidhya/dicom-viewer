<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="xr-spatial-tracking" content="allow" />
    <title>DICOM XR Viewer</title>
    <style>
      :root {
        --bg: #0a0e14;
        --muted: #8a919b;
        --text:  #e6e6e6;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: var(--bg);
        font-family: system-ui, 'Segoe UI', sans-serif;
        color: var(--text);
      }

      #xr-root {
        width: 100%;
        height: 100%;
        padding-top: 38px;
      }

      #scene-container {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      #back-link {
        position: fixed; top: 10px; left: 14px;
        font-size: 12px; color: var(--muted); text-decoration: none;
        z-index: 200; opacity: 0.85; transition: opacity 0.15s;
        display: flex; align-items: center; gap: 6px;
      }
      #back-link:hover { opacity: 1; color: var(--text); }

      /* ── Loading overlay ── */
      #xr-overlay {
        position: fixed; inset: 0;
        background: rgba(10, 14, 20, .95);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px; z-index: 300;
        transition: opacity .35s;
      }
      #xr-overlay.hidden { opacity: 0; pointer-events: none; }

      .xr-logo {
        width: 56px; height: 56px; border-radius: 14px;
        background: linear-gradient(135deg, #00d4aa, #7c5cff);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 18px; color: #000; letter-spacing: -0.5px;
        margin-bottom: 4px;
      }

      .spinner {
        width: 44px; height: 44px; border-radius: 50%;
        border: 3px solid #2a323d; border-top-color: #00d4aa;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #xr-progress { font-size: 13px; color: #00d4aa; max-width: 300px; text-align: center; }

      .xr-hint {
        font-size: 11px; color: #8a919b; text-align: center;
        max-width: 280px; line-height: 1.6;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <a id="back-link" href="./index.html">← Back to 2D viewer</a>

    <div id="xr-root">
      <div id="scene-container"></div>
    </div>

    <div id="xr-overlay">
      <div class="xr-logo">Rx</div>
      <div class="spinner"></div>
      <div id="xr-progress">Initialising…</div>
      <p class="xr-hint">
        On Quest Browser: tap the <strong>AR</strong> icon in the address bar or
        the Enter AR button. The main dashboard floats in the scene — use
        <strong>Open</strong> and the slice sliders there (same layout as the 2D viewer).
      </p>
    </div>

    <script type="module" src="/src/xr-main.ts"></script>
  </body>
</html>
