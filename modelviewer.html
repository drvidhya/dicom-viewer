<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLB model viewer</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #0a0e14;
        color: #e6e6e6;
      }
      #back {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 2;
        color: #00d4aa;
      }
      #error {
        display: none;
        position: fixed;
        bottom: 10px;
        left: 10px;
        right: 10px;
        z-index: 2;
        padding: 10px 12px;
        background: rgba(19, 25, 32, 0.92);
        border: 1px solid #ef4444;
        border-radius: 8px;
        font-size: 13px;
        color: #fecaca;
        word-break: break-word;
      }
      #error.visible {
        display: block;
      }
      #canvas-wrap {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script type="module" crossorigin src="./assets/modelviewer-sL5pg6QP.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="./assets/GLTFLoader-B84fONps.js">
  </head>
  <body>
    <a id="back" href="./index.html">← Back</a>
    <div id="canvas-wrap"></div>
    <p id="error" role="alert"></p>
  </body>
</html>
